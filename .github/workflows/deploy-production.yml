name: Verify and deploy production

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ewha-piano-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out GitHub source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Install locked dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Verify code, migrations, tests, types, and build
        working-directory: app
        run: bun run verify:ci

  deploy:
    name: Deploy production
    if: github.event_name != 'pull_request' && github.repository == 'dokkaebimarketing1-lang/higgsfield'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      HIGGSFIELD_WEBSITE_ID: ${{ vars.HIGGSFIELD_WEBSITE_ID }}
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - name: Check out verified GitHub source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Install locked dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Install pinned Higgsfield CLI
        run: npm install --global @higgsfield/cli@1.1.9

      - name: Restore Higgsfield credentials
        env:
          HIGGSFIELD_CREDENTIALS_B64: ${{ secrets.HIGGSFIELD_CREDENTIALS_B64 }}
          HIGGSFIELD_CONFIG_B64: ${{ secrets.HIGGSFIELD_CONFIG_B64 }}
        run: |
          test -n "$HIGGSFIELD_CREDENTIALS_B64"
          test -n "$HIGGSFIELD_CONFIG_B64"
          install -d -m 700 "$HOME/.config/higgsfield"
          umask 077
          printf '%s' "$HIGGSFIELD_CREDENTIALS_B64" | base64 --decode > "$HOME/.config/higgsfield/credentials.json"
          printf '%s' "$HIGGSFIELD_CONFIG_B64" | base64 --decode > "$HOME/.config/higgsfield/config.json"

      - name: Synchronize the Higgsfield deployment mirror
        id: sync
        run: bash scripts/sync-higgsfield.sh

      - name: Deploy live site
        id: deploy
        run: |
          deploy_json="$(higgsfield website deploy "$HIGGSFIELD_WEBSITE_ID" --json --no-color)"
          deploy_status="$(jq -er '.status // .production.status' <<<"$deploy_json")"
          deploy_url="$(jq -er '.url // .production.url' <<<"$deploy_json")"
          test "$deploy_status" = "deployed"
          test "$deploy_url" = "$SITE_URL"
          echo "url=$deploy_url" >>"$GITHUB_OUTPUT"
          echo "Live deployment completed: $deploy_url"

      - name: Verify production DB, sitemap, feeds, and HTTP
        working-directory: app
        run: bun run verify:live

      - name: Write deployment summary
        env:
          PLATFORM_COMMIT: ${{ steps.sync.outputs.platform_commit }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          {
            echo "## Production deployment"
            echo "- GitHub source: \`${GITHUB_SHA}\`"
            echo "- Higgsfield mirror: \`${PLATFORM_COMMIT}\`"
            echo "- Live URL: ${DEPLOY_URL}"
            echo "- Gates: lint, tests, typecheck, migration safety, build, DB, sitemap, feeds, public URLs, draft isolation"
          } >>"$GITHUB_STEP_SUMMARY"
